<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Return to Orbit Household</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f3ea;
        color: #18261f;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, #e5f5ec 0%, transparent 35%),
          radial-gradient(circle at bottom right, #f8e4d7 0%, transparent 30%),
          #f7f3ea;
      }

      main {
        width: min(92vw, 28rem);
        background: rgba(255, 250, 242, 0.94);
        border: 1px solid #e6dccd;
        border-radius: 24px;
        padding: 28px 24px;
        box-shadow: 0 20px 60px rgba(24, 38, 31, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.5;
        color: #54615a;
      }

      a {
        display: inline-block;
        margin-top: 10px;
        border-radius: 999px;
        padding: 12px 16px;
        background: #0b6b57;
        color: #fffaf2;
        text-decoration: none;
        font-weight: 600;
      }

      code {
        display: block;
        margin-top: 16px;
        padding: 12px;
        border-radius: 14px;
        background: #f0e8de;
        color: #3d4942;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Returning to Orbit Household</h1>
      <p id="status">Redirecting back to the app…</p>
      <a id="open-link" href="/">Open Orbit Household</a>
      <code id="callback-url"></code>
    </main>
    <script>
      const nativeTarget = `orbithousehold://open-banking/callback${window.location.search}${window.location.hash}`;
      const expoGoTarget = `exp://192.168.2.80:8081/--/open-banking/callback${window.location.search}${window.location.hash}`;
      const openLink = document.getElementById("open-link");
      const status = document.getElementById("status");
      const callbackUrl = document.getElementById("callback-url");
      const returnMode =
        new URLSearchParams(window.location.search).get("target") === "native"
          ? "native"
          : "expo-go";
      const target = returnMode === "expo-go" ? expoGoTarget : nativeTarget;

      openLink.href = target;
      callbackUrl.textContent = target;

      try {
        window.location.replace(target);
        window.setTimeout(() => {
          status.textContent =
            returnMode === "expo-go"
              ? "If Expo Go did not reopen automatically, use the button below."
              : "If the app did not open automatically, use the button below.";
        }, 1200);
      } catch (_error) {
        status.textContent =
          "Automatic redirect failed. Use the button below to return to the app.";
      }
    </script>
  </body>
</html>
